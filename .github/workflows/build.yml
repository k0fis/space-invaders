name: Build & Release TeaVM

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build TeaVM web version
        run: ./gradlew teavm:build

      - name: Copy index.html to webapp
        run: cp teavm/src/main/resources/index.html teavm/build/dist/webapp/

      - name: Package webapp
        run: |
          cd teavm/build/dist/webapp
          tar -czf ../../../../spaceinvaders-web.tar.gz --exclude='WEB-INF' .

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: spaceinvaders-web.tar.gz
          make_latest: true
